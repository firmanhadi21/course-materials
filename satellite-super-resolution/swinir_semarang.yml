# ==========================================================================
#  SwinIR — Sentinel-2 → PlanetScope SuperDove 3× Super-Resolution
#  6-band (spectrally compatible bands only) — Semarang Case Study
# ==========================================================================
#
#  SwinIR uses Swin Transformer architecture which often outperforms
#  CNN-based methods (ESRGAN/EDSR) especially for:
#  - Fine texture reconstruction
#  - Global context understanding
#  - Spectral consistency across bands
#
#  Band Matching:
#    SuperDove 1 (Coastal Blue, 443nm) ↔ Sentinel-2 B01 (443nm)
#    SuperDove 2 (Blue, 490nm)         ↔ Sentinel-2 B02 (490nm)
#    SuperDove 4 (Green, 565nm)        ↔ Sentinel-2 B03 (560nm)
#    SuperDove 6 (Red, 665nm)          ↔ Sentinel-2 B04 (665nm)
#    SuperDove 7 (Red Edge, 705nm)     ↔ Sentinel-2 B05 (705nm)
#    SuperDove 8 (NIR, 865nm)          ↔ Sentinel-2 B8A (865nm)
#
#  Usage:
#    python launch.py -opt swinir_semarang.yml
#
# ==========================================================================

name: SwinIR_Semarang_6band_x3
model_type: MultiBandSRModel
scale: 3
num_gpu: 1
manual_seed: 42

# --------------------------------------------------------------------------
#  Dataset
# --------------------------------------------------------------------------
datasets:
  train:
    name: Semarang_train_6band
    type: S2PSBasicSRDataset
    lr_dir: case-study/patches_semarang_aligned/train/sentinel2
    hr_dir: case-study/patches_semarang_aligned/train/planetscope
    file_format: npy
    scale: 3
    normalize: true
    norm_method: percentile
    augment: true
    gt_size: 192          # random crop: 192×192 HR → 64×64 LR

    # DataLoader
    use_shuffle: true
    num_worker_per_gpu: 4
    batch_size_per_gpu: 8
    pin_memory: true
    persistent_workers: true
    prefetch_mode: cuda
    num_prefetch_queue: 4

  val:
    name: Semarang_val_6band
    type: S2PSBasicSRDataset
    lr_dir: case-study/patches_semarang_aligned/val/sentinel2
    hr_dir: case-study/patches_semarang_aligned/val/planetscope
    file_format: npy
    scale: 3
    normalize: true
    norm_method: percentile
    augment: false
    gt_size: 0            # no crop during validation

# --------------------------------------------------------------------------
#  Paths
# --------------------------------------------------------------------------
path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~

# --------------------------------------------------------------------------
#  Network — SwinIR (Swin Transformer for Image Restoration)
# --------------------------------------------------------------------------
network_g:
  type: MultiBandSwinIR
  num_in_ch: 6
  num_out_ch: 6
  upscale: 3
  img_size: 64            # LR patch size
  window_size: 8          # Swin Transformer window
  depths: [6, 6, 6, 6, 6, 6]          # 6 RSTB blocks
  num_heads: [6, 6, 6, 6, 6, 6]       # Attention heads per block
  embed_dim: 180          # Embedding dimension
  mlp_ratio: 2            # MLP expansion ratio
  upsampler: pixelshuffle
  resi_connection: 1conv

# --------------------------------------------------------------------------
#  Training
# --------------------------------------------------------------------------
train:
  ema_decay: 0.999

  optim_g:
    type: Adam
    lr: !!float 2e-4
    weight_decay: 0
    betas: [0.9, 0.99]

  scheduler:
    type: CosineAnnealingRestartLR
    periods: [250000, 250000, 250000, 250000]
    restart_weights: [1, 0.5, 0.5, 0.5]
    eta_min: !!float 1e-7

  total_iter: 500000
  warmup_iter: 5000       # LR warmup benefits transformers

  # --- Losses ---
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean

  sam_opt:
    type: SAMLoss
    loss_weight: 0.1      # spectral fidelity regulariser

# --------------------------------------------------------------------------
#  Validation
# --------------------------------------------------------------------------
val:
  val_freq: !!float 5e3
  save_img: false

  metrics:
    psnr:
      type: calculate_psnr_per_band
      crop_border: 0
    ssim:
      type: calculate_ssim_per_band
      crop_border: 0
    sam:
      type: calculate_sam
    ergas:
      type: calculate_ergas
      scale: 3

# --------------------------------------------------------------------------
#  Logging & Checkpointing
# --------------------------------------------------------------------------
logger:
  print_freq: 200
  save_checkpoint_freq: !!float 5e3
  use_tb_logger: false
  wandb:
    project: ~
    resume_id: ~

dist_params:
  backend: nccl
